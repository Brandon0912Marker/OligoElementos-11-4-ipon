  {tema:"Zinc",tipo:"Exceso",q:"¿Qué alteraciones causa el exceso de zinc en el sistema inmune?",o:["Alergias","Alteraciones inmunológicas","Autoinmunidad","Infecciones frecuentes"],a:1},
];

const TIPOS = ["Todos","Función","Alimentos","Deficiencia","Exceso"];
const TEMAS = ["Todos","Azufre","Calcio","Cloro","Cobalto","Cobre","Cromo","Flúor","Fósforo","Hierro","Magnesio","Manganeso","Níquel","Potasio","Silicio","Sodio","Yodo","Zinc"];
const TIPO_COLORS = {Función:"#26c6da",Alimentos:"#66bb6a",Deficiencia:"#ffa726",Exceso:"#ef5350"};
const TIPO_CLASS = {Función:"active-cyan",Alimentos:"active-green",Deficiencia:"active-orange",Exceso:"active-red"};

let filterTipo = "Todos", filterTema = "Todos";
let questions = [], current = 0, score = 0, selected = null, answered = [];

function shuffle(a){return [...a].sort(()=>Math.random()-0.5);}

function getFiltered(){
  return ALL_Q.filter(q=>
    (filterTipo==="Todos"||q.tipo===filterTipo)&&
    (filterTema==="Todos"||q.tema===filterTema)
  );
}

function buildMenu(){
  document.getElementById("total-count").textContent = ALL_Q.length+" preguntas · 17 minerales · funciones, alimentos, deficiencias y excesos";
  // Tipo chips
  const tc = document.getElementById("tipo-chips");
  tc.innerHTML="";
  TIPOS.forEach(t=>{
    const b=document.createElement("button");
    b.className="chip"+(filterTipo===t?" "+(TIPO_CLASS[t]||"active-cyan"):"");
    b.textContent=t;
    b.onclick=()=>{filterTipo=t;buildMenu();};
    tc.appendChild(b);
  });
  // Tema chips
  const tmc = document.getElementById("tema-chips");
  tmc.innerHTML="";
  TEMAS.forEach(t=>{
    const b=document.createElement("button");
    b.className="chip"+(filterTema===t?" active-purple":"");
    b.textContent=t;
    b.onclick=()=>{filterTema=t;buildMenu();};
    tmc.appendChild(b);
  });
  const n=getFiltered().length;
  document.getElementById("filtered-count").textContent=n;
  document.getElementById("start-btn").disabled=n===0;
}

function startQuiz(){
  questions=shuffle(getFiltered());
  current=0; score=0; selected=null; answered=[];
  show("quiz");
  renderQuestion();
}

function renderQuestion(){
  const q=questions[current];
  document.getElementById("q-counter").textContent=`Pregunta ${current+1} de ${questions.length}`;
  document.getElementById("q-score").textContent=`✓ ${score} correctas`;
  document.getElementById("progress-bar").style.width=`${(current/questions.length)*100}%`;
  const tt=document.getElementById("tag-tipo");
  tt.textContent=q.tipo;
  tt.style.background=(TIPO_COLORS[q.tipo]||"#26c6da")+"22";
  tt.style.color=TIPO_COLORS[q.tipo]||"#26c6da";
  tt.style.border=`1px solid ${TIPO_COLORS[q.tipo]||"#26c6da"}55`;
  document.getElementById("tag-tema").textContent=q.tema;
  document.getElementById("question-text").textContent=q.q;
  const opts=document.getElementById("options");
  opts.innerHTML="";
  q.o.forEach((opt,i)=>{
    const b=document.createElement("button");
    b.className="opt";
    b.innerHTML=`<span class="opt-letter">${["A","B","C","D"][i]}.</span>${opt}`;
    b.onclick=()=>handleSelect(i);
    opts.appendChild(b);
  });
  document.getElementById("next-btn").style.display="none";
  selected=null;
}

function handleSelect(idx){
  if(selected!==null)return;
  selected=idx;
  const q=questions[current];
  const correct=idx===q.a;
  if(correct)score++;
  answered.push({q:q.q,tema:q.tema,tipo:q.tipo,selected:idx,correctIdx:q.a,options:q.o,isCorrect:correct});
  const btns=document.getElementById("options").querySelectorAll(".opt");
  btns.forEach((b,i)=>{
    b.onclick=null;
    if(i===q.a)b.classList.add("correct");
    else if(i===idx&&!correct)b.classList.add("wrong");
  });
  const nb=document.getElementById("next-btn");
  nb.textContent=current+1>=questions.length?"Ver resultados →":"Siguiente →";
  nb.style.display="inline-block";
}

function nextQuestion(){
  if(current+1>=questions.length){showResults();return;}
  current++;
  renderQuestion();
}

function showResults(){
  show("results");
  const pct=Math.round((score/questions.length)*100);
  document.getElementById("res-emoji").textContent=pct>=80?"🏆":pct>=50?"👍":"📚";
  document.getElementById("res-msg").textContent=pct>=80?"¡Dominas los oligoelementos!":pct>=50?"¡Buen intento, sigue practicando!":"Repasa el material e inténtalo de nuevo.";
  document.getElementById("res-score").textContent=score;
  document.getElementById("res-den").textContent="/"+questions.length;
  document.getElementById("res-pct").textContent=pct+"% correcto";
  // By tema
  const byTema={};
  answered.forEach(a=>{
    if(!byTema[a.tema])byTema[a.tema]={c:0,t:0};
    byTema[a.tema].t++;
    if(a.isCorrect)byTema[a.tema].c++;
  });
  const bt=document.getElementById("by-tema");
  bt.innerHTML="";
  Object.entries(byTema).forEach(([tema,{c,t}])=>{
    const p=Math.round((c/t)*100);
    const d=document.createElement("div");
    d.className="tema-badge";
    const col=p>=80?"38,198,218":p>=50?"255,167,38":"244,67,54";
    d.style.background=`rgba(${col},0.15)`;
    d.style.border=`1px solid rgba(${col},0.4)`;
    d.innerHTML=`<b>${tema}</b> ${c}/${t}`;
    bt.appendChild(d);
  });
  // Errors
  const errs=answered.filter(a=>!a.isCorrect);
  const es=document.getElementById("errors-section");
  if(errs.length>0){
    es.style.display="block";
    const el=document.getElementById("errors-list");
    el.innerHTML="";
    errs.forEach(a=>{
      const d=document.createElement("div");
      d.className="error-item";
      d.innerHTML=`<div class="error-q"><b>[${a.tema} · ${a.tipo}]</b> ${a.q}</div><div class="error-wrong">✗ Tu respuesta: ${a.options[a.selected]}</div><div class="error-right">✓ Correcto: ${a.options[a.correctIdx]}</div>`;
      el.appendChild(d);
    });
  } else es.style.display="none";
}

function retryQuiz(){startQuiz();}
function goMenu(){show("menu");buildMenu();}

function show(id){
  ["menu","quiz","results"].forEach(s=>document.getElementById(s).style.display=s===id?"block":"none");
}

// Init
buildMenu();
</script>
